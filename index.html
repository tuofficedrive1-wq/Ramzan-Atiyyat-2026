<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }
        body {
            background: linear-gradient(135deg, #198754 0%, #0d4d2d 100%);
            font-family: 'Jameel Noori Nastaleeq', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .form-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .form-label { font-size: 20px; color: #1b5e20; font-weight: bold; margin-bottom: 5px; }
        .form-control, .form-select {
            font-family: 'Jameel Noori Nastaleeq', serif;
            font-size: 19px;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: right;
            background-position: left 0.75rem center; /* Arrow left side par (RTL fix) */
        }
        /* Dropdown arrow fix for RTL */
        .form-select {
            padding-left: 2.5rem !important;
            padding-right: 1rem !important;
        }
        .btn-submit {
            background: #198754; color: white; width: 100%; padding: 15px;
            font-size: 24px; border-radius: 12px; border: none; margin-top: 10px;
        }
        #rankCard { display: none; text-align: center; }
        .dua-box { background: #f1f8e9; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 18px; }
    </style>
</head>
<body>

<div class="form-card animate__animated animate__fadeInDown">
    <div id="formSection">
        <h2 class="text-center text-success mb-4" style="font-weight: bold;">رمضان عطیات مقابلہ</h2>
        <form id="atiyyatForm">
            <label class="form-label">نام</label>
            <input type="text" name="name" class="form-control" required>

            <label class="form-label">جامعہ</label>
            <input type="text" name="jamia" class="form-control" required>

            <label class="form-label">درجہ (منتخب کریں)</label>
            <select name="darja" class="form-select" required>
                <option value="" disabled selected>درجہ منتخب کریں</option>
                <option>حفظ کلاس</option>
                <option>ابتدائیہ</option>
                <option>سال اول</option>
                <option>سال دوم</option>
                <option>اولیٰ</option>
                <option>ثانیہ</option>
                <option>ثالثہ</option>
                <option>رابعہ</option>
                <option>خامسہ</option>
                <option>سادسہ</option>
                <option>سابعہ</option>
                <option>دورۃ الحدیث</option>
                <option>قرات کورس</option>
            </select>

            <label class="form-label">ریجن</label>
            <select name="region" class="form-select" required>
                <option value="" disabled selected>ریجن منتخب کریں</option>
                <option>اجمیر</option>
                <option>دہلی</option>
                <option>ممبئی</option>
                <option>حیدرآباد</option>
                <option>بینگلور</option>
                <option>کلکتہ</option>
            </select>

            <div class="row">
                <div class="col-6"><label class="form-label">آپ کے عطیات</label><input type="number" name="personal_amount" class="form-control" required></div>
                <div class="col-6"><label class="form-label">درجے کے عطیات</label><input type="number" name="class_amount" class="form-control" required></div>
            </div>

            <button type="submit" class="btn btn-submit" id="submitBtn">ڈیٹا جمع کریں</button>
        </form>
    </div>

    <div id="rankCard" class="animate__animated animate__zoomIn">
        <h3 class="text-success">ماشاءاللہ! ڈیٹا محفوظ ہو گیا</h3>
        <div class="alert alert-success mt-3">آل انڈیا رینک: <strong id="airRankDisplay"></strong></div>
        <div class="alert alert-info">ریجن (<span id="regionNameDisplay"></span>) رینک: <strong id="regRankDisplay"></strong></div>
        
        <div class="dua-box">
            اب اگلے جمعہ کو کارکردگی لی جائے گی۔<br>
            تب تک مزید کوششوں کو بڑھا دیں ۔<br>
            <strong>اللہ پاک آپ سب کو رمضان کی برکتیں نصیب فرمائے۔</strong>
        </div>
        <button onclick="window.location.reload()" class="btn btn-success w-100">واپس جائیں</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxusmLFcYMTi_Fea1P0awYRRjFWuTlAHt6nlcqK7i_Wh809uu5m9EvcSzWdmVkbK5JD/exec'; 
    const form = document.getElementById('atiyyatForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        Swal.fire({ title: 'انتظار کریں...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => response.json())
            .then(data => {
                Swal.close();
                if(data.status === 'success') {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('rankCard').style.display = 'block';
                    document.getElementById('airRankDisplay').innerText = data.airRank;
                    document.getElementById('regRankDisplay').innerText = data.regRank;
                    document.getElementById('regionNameDisplay').innerText = data.regionName;
                }
            }).catch(error => Swal.fire('Error!', 'دوبارہ کوشش کریں', 'error'));
    });
</script>
</body>
</html>
