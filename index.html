<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }
        body {
            background: linear-gradient(135deg, #198754 0%, #0d4d2d 100%);
            font-family: 'Jameel Noori Nastaleeq', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
        }
        .form-card {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 2;
        }
        /* Dropdown Arrow Fix */
        .form-select {
            font-family: 'Jameel Noori Nastaleeq', serif;
            background-position: left 0.75rem center !important;
            padding-left: 2.5rem !important;
            padding-right: 1rem !important;
        }
        .form-control { font-family: 'Jameel Noori Nastaleeq', serif; }
        
        .btn-submit {
            background: #198754; color: white; width: 100%; padding: 12px;
            font-size: 24px; border-radius: 12px; border: none; margin-top: 10px;
        }

        /* Watermark Styling */
        .watermark {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: rgba(255, 255, 255, 0.3); /* Halka safed rang */
            pointer-events: none;
            z-index: 1;
            white-space: nowrap;
        }

        #rankCard { display: none; text-align: center; }
        .dua-box { background: #f1f8e9; padding: 15px; border-radius: 10px; margin: 20px 0; font-size: 18px; }
    </style>
</head>
<body>

<div class="form-card animate__animated animate__fadeInDown">
    <div id="formSection">
        <h2 class="text-center text-success mb-4" style="font-weight: bold;">رمضان عطیات مقابلہ</h2>
        <form id="atiyyatForm">
            <label class="form-label fw-bold text-success">نام</label>
            <input type="text" name="name" class="form-control mb-3" placeholder="نام لکھیں" required>

            <label class="form-label fw-bold text-success">جامعہ</label>
            <input type="text" name="jamia" class="form-control mb-3" placeholder="جامعہ کا نام" required>

            <label class="form-label fw-bold text-success">درجہ</label>
            <select name="darja" class="form-select mb-3" required>
                <option value="" disabled selected>منتخب کریں</option>
                <option>حفظ کلاس</option>
                <option>ابتدائیہ</option>
                <option>سال اول</option>
                <option>سال دوم</option>
                <option>اولیٰ</option>
                <option>ثانیہ</option>
                <option>ثالثہ</option>
                <option>رابعہ</option>
                <option>خامسہ</option>
                <option>سادسہ</option>
                <option>سابعہ</option>
                <option>دورۃ الحدیث</option>
                <option>قرات کورس</option>
            </select>

            <label class="form-label fw-bold text-success">ریجن</label>
            <select name="region" class="form-select mb-3" required>
                <option value="" disabled selected>ریجن منتخب کریں</option>
                <option>اجمیر</option>
                <option>دہلی</option>
                <option>ممبئی</option>
                <option>حیدرآباد</option>
                <option>بینگلور</option>
                <option>کلکتہ</option>
            </select>

            <div class="row mb-3">
                <div class="col-6">
                    <label class="form-label fw-bold text-success">آپ کے عطیات</label>
                    <input type="number" name="personal_amount" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-bold text-success">درجے کے عطیات</label>
                    <input type="number" name="class_amount" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-submit shadow-sm" id="submitBtn">ڈیٹا جمع کریں</button>
        </form>
    </div>

    <div id="rankCard" class="animate__animated animate__zoomIn">
        <h3 class="text-success fw-bold">جزاک اللہ خیرا !</h3>
        <div class="p-3 bg-light border rounded-4 my-3">
            <div class="fs-5">آل انڈیا رینک: <strong id="airRankDisplay" class="text-danger fs-3"></strong></div>
            <hr>
            <div class="fs-5">ریجن (<span id="regionNameDisplay"></span>) رینک: <strong id="regRankDisplay" class="text-primary fs-3"></strong></div>
        </div>
        
        <div class="dua-box">
            اب اگلے جمعہ کو کارکردگی لی جائے گی۔<br>
            تب تک مزید کوششوں کو بڑھا دیں ۔<br>
            <strong>اللہ پاک آپ سب کو رمضان کی برکتیں نصیب فرمائے۔</strong>
        </div>
        <button onclick="window.location.reload()" class="btn btn-success w-100 fs-4 py-2">واپس جائیں</button>
    </div>
</div>

<div class="watermark animate__animated animate__fadeInUp">
    مجلس تعلیمی امور ہند
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxusmLFcYMTi_Fea1P0awYRRjFWuTlAHt6nlcqK7i_Wh809uu5m9EvcSzWdmVkbK5JD/exec'; 
    const form = document.getElementById('atiyyatForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        Swal.fire({ 
            title: 'انتظار کریں...', 
            text: 'ڈیٹا اپ لوڈ ہو رہا ہے',
            allowOutsideClick: false, 
            didOpen: () => { Swal.showLoading(); } 
        });

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => response.json())
            .then(data => {
                Swal.close();
                if(data.status === 'success') {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('rankCard').style.display = 'block';
                    document.getElementById('airRankDisplay').innerText = data.airRank;
                    document.getElementById('regRankDisplay').innerText = data.regRank;
                    document.getElementById('regionNameDisplay').innerText = data.regionName;
                }
            }).catch(error => Swal.fire('Error!', 'نیٹ ورک چیک کریں اور دوبارہ کوشش کریں', 'error'));
    });
</script>
</body>
</html>
