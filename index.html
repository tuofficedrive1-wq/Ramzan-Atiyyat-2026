<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }
        body {
            background-color: #f4f7f6;
            font-family: 'Jameel Noori Nastaleeq', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 550px; }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid #198754;
        }
        .header-section { text-align: center; margin-bottom: 25px; }
        .header-title { color: #198754; font-size: 30px; font-weight: bold; }
        .sub-title { color: #2c3e50; font-size: 24px; }
        .form-label { font-size: 20px; color: #444; margin-bottom: 8px; display: block; }
        .form-control, .form-select {
            font-family: 'Jameel Noori Nastaleeq', serif;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #eee;
            margin-bottom: 20px;
        }
        .btn-submit {
            background-color: #198754;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 24px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
        }
        .btn-submit:hover { background-color: #146c43; }
        
        /* Rank Card Style */
        #rankCard {
            display: none;
            background: #ffffff;
            border: 3px double #198754;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
        }
        .rank-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }
        .rank-number { font-size: 40px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card" id="mainContainer">
        <div class="header-section">
            <h1 class="header-title">رمضان عطیات مقابلہ</h1>
            <h2 class="sub-title">جامعۃ المدینہ انڈیا</h2>
        </div>

        <form id="atiyyatForm">
            <label class="form-label">نام (Name)</label>
            <input type="text" name="name" class="form-control" placeholder="اپنا نام لکھیں" required>

            <label class="form-label">جامعہ (Jamia)</label>
            <input type="text" name="jamia" class="form-control" placeholder="جامعہ کا نام" required>

            <label class="form-label">درجہ (جس کے آپ معلم الدرجہ ہیں)</label>
            <input type="text" name="darja" class="form-control" placeholder="درجہ لکھیں" required>

            <label class="form-label">ریجن (Region)</label>
            <select name="region" class="form-select" required>
                <option value="" disabled selected>منتخب کریں</option>
                <option value="اجمیر">اجمیر</option>
                <option value="دہلی">دہلی</option>
                <option value="ممبئی">ممبئی</option>
                <option value="حیدرآباد">حیدرآباد</option>
                <option value="بینگلور">بینگلور</option>
                <option value="کلکتہ">کلکتہ</option>
            </select>

            <label class="form-label">آپ کے عطیات</label>
            <input type="number" name="personal_amount" class="form-control" placeholder="اپنی رقم درج کریں" required>

            <label class="form-label">آپ کے درجے کے عطیات</label>
            <input type="number" name="class_amount" class="form-control" placeholder="درجے کی رقم درج کریں" required>

            <button type="submit" class="btn btn-submit" id="submitBtn">ڈیٹا جمع کریں</button>
        </form>

        <div id="rankCard">
            <h2 style="color: #198754;">ماشاءاللہ! ڈیٹا محفوظ ہو گیا</h2>
            <hr>
            <div class="rank-box">
                <div style="font-size: 22px;">آپ کا آل انڈیا رینک:</div>
                <div class="rank-number" id="airRankDisplay">0</div>
            </div>
            <div class="rank-box" style="background: #e3f2fd;">
                <div style="font-size: 22px;">ریجن (<span id="regionNameDisplay"></span>) میں رینک:</div>
                <div class="rank-number" style="color: #1976d2;" id="regRankDisplay">0</div>
            </div>
            <p style="font-size: 18px; color: #555;">کل شرکاء: <span id="totalDisplay"></span></p>
            <button onclick="window.location.reload()" class="btn btn-outline-success">نیا فارم بھریں</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'YOUR_APPS_SCRIPT_URL_HERE';
    const form = document.getElementById('atiyyatForm');
    const rankCard = document.getElementById('rankCard');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "ڈیٹا بھیجا جا رہا ہے...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    form.style.display = 'none';
                    rankCard.style.display = 'block';
                    
                    document.getElementById('airRankDisplay').innerText = data.airRank;
                    document.getElementById('regRankDisplay').innerText = data.regRank;
                    document.getElementById('regionNameDisplay').innerText = data.regionName;
                    document.getElementById('totalDisplay').innerText = data.total;
                } else {
                    alert("Error: " + data.message);
                    btn.disabled = false;
                    btn.innerHTML = "دوبارہ کوشش کریں";
                }
            })
            .catch(error => {
                alert("نیٹ ورک کا مسئلہ ہے!");
                btn.disabled = false;
                btn.innerHTML = "ڈیٹا جمع کریں";
            });
    });
</script>

</body>
</html>
