<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* Jameel Noori Nastaleeq Font Load Karna */
        @font-face {
            font-family: 'Jameel Noori';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }

        body {
            background-color: #0d4d2d;
            font-family: 'Jameel Noori', serif;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .form-card {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-top: 8px solid #ffd700;
        }

        .header-title {
            color: #198754;
            font-size: 28px;
            text-align: center;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-label { font-size: 18px; color: #1b5e20; margin-top: 10px; font-weight: bold; display: block; }
        
        .form-control, .form-select {
            font-family: 'Jameel Noori', serif;
            font-size: 17px;
            border-radius: 10px;
            border: 2px solid #eee;
            margin-bottom: 10px;
            text-align: right;
        }

        /* Rank Card Styling */
        #rankCard { display: none; text-align: center; }
        
        .rank-container {
            background: #fdfdfd;
            border: 2px solid #198754;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .rank-num { font-size: 32px; color: #d32f2f; font-weight: bold; }
        
        .dua-box {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            font-size: 17px;
            color: #1b5e20;
            line-height: 1.6;
        }

        .btn-success {
            background-color: #198754 !important;
            border: none;
            font-size: 20px;
            padding: 10px;
            border-radius: 10px;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="form-card animate__animated animate__fadeInDown">
    <div id="formSection">
        <h1 class="header-title">رمضان عطیات مقابلہ</h1>
        <p class="text-center text-muted mb-4">جامعۃ المدینہ انڈیا</p>
        
        <form id="atiyyatForm">
            <label class="form-label">نام</label>
            <input type="text" name="name" class="form-control" required>
            
            <label class="form-label">موبائل نمبر (ای رسید والا)</label>
            <input type="tel" name="mobile" class="form-control" required>

            <label class="form-label">ریجن</label>
            <select name="region" id="region" class="form-select" onchange="updateZimmedar()" required><option>لوڈ ہو رہا ہے...</option></select>

            <label class="form-label">تعلیمی ذمہ دار</label>
            <select name="zimmedar" id="zimmedar" class="form-select" onchange="updateJamia()" required><option>انتظار کریں...</option></select>

            <label class="form-label">جامعہ</label>
            <select name="jamia" id="jamia" class="form-select" required><option>انتظار کریں...</option></select>

            <label class="form-label">درجہ</label>
            <select name="darja" id="darja" class="form-select" required><option>لوڈ ہو رہا ہے...</option></select>

            <div class="row">
                <div class="col-6"><label class="form-label">آپ کے عطیات</label><input type="number" name="personal_amount" class="form-control" required></div>
                <div class="col-6"><label class="form-label">درجے کے عطیات</label><input type="number" name="class_amount" class="form-control" required></div>
            </div>
            
            <button type="submit" class="btn btn-success w-100 mt-3 shadow">ڈیٹا جمع کریں</button>
        </form>
    </div>

    <div id="rankCard" class="animate__animated animate__zoomIn">
        <h2 style="color: #198754; font-size: 32px;">جزاک اللہ خیرا!</h2>
        
        <div class="rank-container">
            <div style="font-size: 18px;">آل انڈیا رینک: <span class="rank-num" id="airRank">0</span></div>
            <hr style="margin: 10px 0;">
            <div style="font-size: 18px;">ریجن (<span id="regName"></span>) رینک: <span class="rank-num" style="color: #0d6efd;" id="regRank">0</span></div>
        </div>

        <div class="dua-box">
            اب اگلے جمعہ کو کارکردگی لی جائے گی۔<br>
            تب تک مزید کوششوں کو بڑھا دیں ۔<br>
            <b>اللہ پاک آپ سب کو رمضان کی برکتیں نصیب فرمائے۔</b>
        </div>
        
        <button onclick="location.reload()" class="btn btn-success w-100 mt-3">واپس جائیں</button>
    </div>
</div>

<div class="watermark">مجلس تعلیمی امور ہند</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    var fullMapping = {};
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwoHGtAnEbxMm7MET-yx3VOPj5vymGIZx930ezNudG4vVD-i3IL2B_SgGLYCqCnpksc/exec';
    const mySheetId = '1ScZXudbJfJ8mxkW4FvnzdIundwBMjRXqZrqnTnqhzXg';
    const mySheetName = 'data';

    // Dropdowns Load Karna (JSONP)
    window.onload = function() {
        var script = document.createElement('script');
        script.src = `${scriptURL}?action=getDropdowns&sheetId=${mySheetId}&sheetName=${mySheetName}&callback=initData`;
        document.body.appendChild(script);
    };

    function initData(res) {
        fullMapping = res.mapping;
        fillDrop('region', res.regions);
        fillDrop('darja', res.classes);
    }

    function fillDrop(id, list) {
        let el = document.getElementById(id);
        el.innerHTML = '<option value="">منتخب کریں</option>';
        list.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
    }

    function updateZimmedar() {
        let r = document.getElementById('region').value;
        fillDrop('zimmedar', Object.keys(fullMapping[r] || {}));
        document.getElementById('jamia').innerHTML = '<option value="">ذمہ دار چنیں</option>';
    }

    function updateJamia() {
        let r = document.getElementById('region').value;
        let z = document.getElementById('zimmedar').value;
        fillDrop('jamia', fullMapping[r][z] || []);
    }

    // Form Submit handling
    document.getElementById('atiyyatForm').onsubmit = function(e) {
        e.preventDefault();
        Swal.fire({ title: 'انتظار کریں...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(r => r.json()).then(res => {
                Swal.close();
                if(res.status === 'success') {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('rankCard').style.display = 'block';
                    document.getElementById('airRank').innerText = res.airRank;
                    document.getElementById('regRank').innerText = res.regRank;
                    document.getElementById('regName').innerText = res.region;
                }
            }).catch(() => Swal.fire('Error', 'Net check karein', 'error'));
    };
</script>
</body>
</html>
