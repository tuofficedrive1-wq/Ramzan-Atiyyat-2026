<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramzan Atiyyat Competition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-card {
            max-width: 500px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid #198754;
        }
        .header-title {
            color: #198754;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }
        .sub-title {
            font-family: 'Jameel Noori Nastaleeq', serif;
            font-size: 24px;
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .btn-submit {
            background-color: #198754;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #146c43;
        }
        #message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 class="header-title">Ramzan Atiyyat Competition</h2>
        <h3 class="sub-title">جامعۃ المدینہ انڈیا</h3>
        
        <form id="competitionForm">
            <div class="mb-3">
                <label class="form-label">Naam (Name)</label>
                <input type="text" name="name" class="form-control" placeholder="Apna naam likhein" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Jamia</label>
                <input type="text" name="jamia" class="form-control" placeholder="Apne Jamia ka naam" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Atiyyat Amount (Raqam)</label>
                <input type="number" name="amount" class="form-control" placeholder="Raqam likhein" required>
            </div>

            <button type="submit" class="btn btn-submit" id="submitBtn">Data Jama Karein</button>
        </form>
        
        <div id="message"></div>
    </div>
</div>

<script>
    // Apne Google Apps Script Web App ka URL yahan paste karein
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE';
    const form = document.getElementById('competitionForm');
    const msg = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Processing...";
        msg.innerHTML = "Data bheja ja raha hai...";
        msg.className = "text-primary";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.innerHTML = "Shukriya! Data kamyabi se jama ho gaya.";
                msg.className = "text-success";
                btn.disabled = false;
                btn.innerHTML = "Data Jama Karein";
                form.reset();
            })
            .catch(error => {
                msg.innerHTML = "Maaf kijiyega, error aaya hai!";
                msg.className = "text-danger";
                btn.disabled = false;
                btn.innerHTML = "Dobara Koshish Karein";
                console.error('Error!', error.message);
            });
    });
</script>

</body>
</html>
