<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }

        body {
            background: linear-gradient(135deg, #198754 0%, #0d4d2d 100%);
            font-family: 'Jameel Noori Nastaleeq', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 2px solid #ffd700;
        }

        .header-title { color: #198754; font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 0; }
        .sub-title { color: #2c3e50; font-size: 24px; text-align: center; margin-bottom: 25px; }

        .form-label { font-size: 20px; color: #1b5e20; margin-bottom: 5px; font-weight: bold; }
        
        .form-control, .form-select {
            font-family: 'Jameel Noori Nastaleeq', serif;
            font-size: 19px;
            border-radius: 12px;
            border: 2px solid #ddd;
            padding: 12px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 10px rgba(25, 135, 84, 0.2);
        }

        .btn-submit {
            background: linear-gradient(to left, #198754, #28a745);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 26px;
            border-radius: 12px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 10px;
        }

        /* Rank Card Styling */
        #rankCard { display: none; text-align: center; }
        
        .rank-badge {
            background: #fff3e0;
            border: 2px solid #ffa000;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .rank-num { font-size: 50px; color: #d32f2f; font-weight: bold; line-height: 1; }
        
        .dua-box {
            background: #f1f8e9;
            border-right: 5px solid #198754;
            padding: 15px;
            margin: 20px 0;
            font-size: 20px;
            color: #1b5e20;
            line-height: 1.6;
            text-align: center;
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            .form-card { padding: 20px; }
            .header-title { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="form-card animate__animated animate__fadeInDown">
        
        <div id="formSection">
            <h1 class="header-title">رمضان عطیات مقابلہ</h1>
            <h2 class="sub-title">جامعۃ المدینہ انڈیا</h2>

            <form id="atiyyatForm">
                <label class="form-label">نام (Name)</label>
                <input type="text" name="name" class="form-control" placeholder="اپنا نام لکھیں" required>

                <label class="form-label">جامعہ (Jamia)</label>
                <input type="text" name="jamia" class="form-control" placeholder="جامعہ کا نام" required>

                <label class="form-label">درجہ (معلم الدرجہ)</label>
                <input type="text" name="darja" class="form-control" placeholder="درجہ لکھیں" required>

                <label class="form-label">ریجن (Region)</label>
                <select name="region" class="form-select" required>
                    <option value="" disabled selected>منتخب کریں</option>
                    <option value="اجمیر">اجمیر</option>
                    <option value="دہلی">دہلی</option>
                    <option value="ممبئی">ممبئی</option>
                    <option value="حیدرآباد">حیدرآباد</option>
                    <option value="بینگلور">بینگلور</option>
                    <option value="کلکتہ">کلکتہ</option>
                </select>

                <div class="row">
                    <div class="col-6">
                        <label class="form-label">آپ کے عطیات</label>
                        <input type="number" name="personal_amount" class="form-control" placeholder="رقم" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">درجے کے عطیات</label>
                        <input type="number" name="class_amount" class="form-control" placeholder="رقم" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit animate__animated animate__pulse animate__infinite">ڈیٹا جمع کریں</button>
            </form>
        </div>

        <div id="rankCard" class="animate__animated animate__zoomIn">
            <h2 style="color: #198754; font-weight: bold;">ماشاءاللہ! رینکنگ لسٹ</h2>
            
            <div class="rank-badge">
                <div style="font-size: 20px;">آل انڈیا رینک</div>
                <div class="rank-num" id="airRankDisplay">0</div>
            </div>

            <div class="rank-badge" style="background: #e3f2fd; border-color: #1976d2;">
                <div style="font-size: 20px;">ریجن (<span id="regionNameDisplay"></span>) رینک</div>
                <div class="rank-num" style="color: #1976d2;" id="regRankDisplay">0</div>
            </div>

            <div class="dua-box">
                اب اگلے جمعہ کو کارکردگی لی جائے گی۔<br>
                تب تک مزید کوششوں کو بڑھا دیں ۔<br>
                <strong>اللہ پاک آپ سب کو رمضان کی برکتیں نصیب فرمائے۔</strong>
            </div>

            <button onclick="window.location.reload()" class="btn btn-success w-100 fs-4">واپس جائیں</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const scriptURL = 'YOUR_APPS_SCRIPT_URL_HERE'; // Apna URL yahan lagayein
    const form = document.getElementById('atiyyatForm');
    const formSection = document.getElementById('formSection');
    const rankCard = document.getElementById('rankCard');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        Swal.fire({
            title: 'براہ کرم انتظار کریں',
            text: 'آپ کا ڈیٹا محفوظ کیا جا رہا ہے...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => response.json())
            .then(data => {
                Swal.close();
                if(data.status === 'success') {
                    formSection.style.display = 'none';
                    rankCard.style.display = 'block';
                    
                    document.getElementById('airRankDisplay').innerText = data.airRank;
                    document.getElementById('regRankDisplay').innerText = data.regRank;
                    document.getElementById('regionNameDisplay').innerText = data.regionName;
                }
            })
            .catch(error => {
                Swal.fire('Error!', 'نیٹ ورک کا مسئلہ ہے، دوبارہ کوشش کریں', 'error');
            });
    });
</script>

</body>
</html>
