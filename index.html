<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Jameel Noori Nastaleeq', 'Segoe UI', Tahoma, sans-serif;
            text-align: right;
        }

        .form-card {
            max-width: 550px;
            margin: 30px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 10px solid #198754;
        }

        .header-title {
            color: #198754;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .sub-title {
            font-size: 24px;
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            border-bottom: 2px solid #f1f1f1;
            padding-bottom: 10px;
        }

        .form-label {
            font-size: 20px;
            color: #34495e;
            font-weight: 500;
        }

        .form-control {
            font-family: 'Jameel Noori Nastaleeq', serif;
            font-size: 18px;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #e9ecef;
            margin-bottom: 15px;
        }

        .btn-submit {
            background-color: #198754;
            color: white;
            width: 100%;
            padding: 12px;
            font-size: 22px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #146c43;
        }

        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h1 class="header-title">رمضان عطیات مقابلہ</h1>
        <h2 class="sub-title">جامعۃ المدینہ انڈیا</h2>
        
        <form id="atiyyatForm">
            <div class="mb-3">
                <label class="form-label">نام (Name)</label>
                <input type="text" name="name" class="form-control" placeholder="اپنا نام لکھیں" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">جامعہ (Jamia)</label>
                <input type="text" name="jamia" class="form-control" placeholder="اپنے جامعہ کا نام لکھیں" required>
            </div>

            <div class="mb-3">
                <label class="form-label">درجہ (جس کے آپ معلم الدرجہ ہیں)</label>
                <input type="text" name="darja" class="form-control" placeholder="درجہ لکھیں (مثلاً اولیٰ، ثانیہ)" required>
            </div>

            <div class="mb-3">
                <label class="form-label">آپ کے عطیات</label>
                <input type="number" name="personal_amount" class="form-control" placeholder="اپنی انفرادی رقم لکھیں" required>
            </div>

            <div class="mb-3">
                <label class="form-label">آپ کے درجے کے عطیات</label>
                <input type="number" name="class_amount" class="form-control" placeholder="درجے کی کل رقم لکھیں" required>
            </div>

            <button type="submit" class="btn btn-submit" id="submitBtn">ڈیٹا جمع کریں</button>
        </form>
        
        <div id="message"></div>
    </div>
</div>

<script>
    const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL_HERE'; // Apna URL yahan dalein
    const form = document.getElementById('atiyyatForm');
    const msg = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "ڈیٹا بھیجا جا رہا ہے...";
        msg.innerHTML = "انتظار فرمائیں...";
        msg.className = "text-primary";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                msg.innerHTML = "شکریہ! ڈیٹا کامیابی سے محفوظ ہو گیا۔";
                msg.className = "text-success";
                btn.disabled = false;
                btn.innerHTML = "ڈیٹا جمع کریں";
                form.reset();
            })
            .catch(error => {
                msg.innerHTML = "معذرت، دوبارہ کوشش کریں!";
                msg.className = "text-danger";
                btn.disabled = false;
                btn.innerHTML = "دوبارہ کوشش کریں";
            });
    });
</script>

</body>
</html>
