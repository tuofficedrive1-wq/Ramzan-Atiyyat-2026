<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face { font-family: 'Jameel Noori Nastaleeq'; src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf'); }
        body { background: #0d4d2d; font-family: 'Jameel Noori Nastaleeq', sans-serif; padding: 15px; }
        .form-card { background: white; max-width: 500px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-label { color: #198754; font-weight: bold; font-size: 20px; }
        .form-control, .form-select { margin-bottom: 15px; font-size: 18px; border-radius: 10px; text-align: right; }
        .watermark { text-align: center; color: rgba(255,255,255,0.4); margin-top: 20px; font-size: 22px; }
        #rankCard { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="form-card">
    <div id="formSection">
        <h2 class="text-center text-success mb-4">رمضان عطیات مقابلہ</h2>
        <form id="atiyyatForm">
            <label class="form-label">نام</label>
            <input type="text" name="name" class="form-control" required>

            <label class="form-label">موبائل نمبر (جس پر ای رسید بنی ہے)</label>
            <input type="tel" name="mobile" class="form-control" placeholder="0000000000" required>

            <label class="form-label">ریجن</label>
            <select name="region" id="region" class="form-select" onchange="updateZimmedar()" required><option value="">لوڈ ہو رہا ہے...</option></select>

            <label class="form-label">تعلیمی ذمہ دار</label>
            <select name="zimmedar" id="zimmedar" class="form-select" onchange="updateJamia()" required><option value="">ریجن منتخب کریں</option></select>

            <label class="form-label">جامعہ</label>
            <select name="jamia" id="jamia" class="form-select" required><option value="">ذمہ دار منتخب کریں</option></select>

            <label class="form-label">درجہ</label>
            <select name="darja" id="darja" class="form-select" required><option value="">لوڈ ہو رہا ہے...</option></select>

            <div class="row">
                <div class="col-6"><label class="form-label">آپ کے عطیات</label><input type="number" name="personal_amount" class="form-control" required></div>
                <div class="col-6"><label class="form-label">درجے کے عطیات</label><input type="number" name="class_amount" class="form-control" required></div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fs-4" id="submitBtn">ڈیٹا جمع کریں</button>
        </form>
    </div>

    <div id="rankCard">
        <h3 class="text-success">جزاک اللہ خیرا!</h3>
        <div class="alert alert-success fs-4">آل انڈیا رینک: <strong id="airRank"></strong></div>
        <button onclick="location.reload()" class="btn btn-outline-success w-100 mt-3">واپس جائیں</button>
    </div>
</div>

<div class="watermark">مجلس تعلیمی امور ہند</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    var fullMapping = {};
    // --- SETTINGS ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzOZcLoRDzXgmzvcgePP84BSP2QjORuT9wZMIvret0fYDzLIiV_3Fd_tg4F1qfC5efx/exec'; 
    const mySheetId = '1ScZXudbJfJ8mxkW4FvnzdIundwBMjRXqZrqnTnqhzXg'; // Sheet ID yahan hai
    const mySheetName = 'data'; // Sheet Name yahan hai
    // ----------------

    window.onload = function() {
        // JSONP Call to get data
        var script = document.createElement('script');
        script.src = `${scriptURL}?action=getDropdowns&sheetId=${mySheetId}&sheetName=${mySheetName}&callback=setupData`;
        document.body.appendChild(script);
    };

    function setupData(res) {
        fullMapping = res.mapping;
        populateDropdown('region', res.regions);
        populateDropdown('darja', res.classes);
    }

    function populateDropdown(id, list) {
        let select = document.getElementById(id);
        if(!select) return;
        select.innerHTML = '<option value="">منتخب کریں</option>';
        list.forEach(item => {
            select.innerHTML += `<option value="${item}">${item}</option>`;
        });
    }

    function updateZimmedar() {
        let reg = document.getElementById('region').value;
        let zimList = Object.keys(fullMapping[reg] || {});
        populateDropdown('zimmedar', zimList);
        document.getElementById('jamia').innerHTML = '<option value="">ذمہ دار منتخب کریں</option>';
    }

    function updateJamia() {
        let reg = document.getElementById('region').value;
        let zim = document.getElementById('zimmedar').value;
        let jamList = (fullMapping[reg] && fullMapping[reg][zim]) ? fullMapping[reg][zim] : [];
        populateDropdown('jamia', jamList);
    }

    document.getElementById('atiyyatForm').onsubmit = function(e) {
        e.preventDefault();
        Swal.fire({ title: 'انتظار کریں...', didOpen: () => Swal.showLoading() });
        
        fetch(scriptURL, { method: 'POST', body: new FormData(this) })
            .then(r => r.json())
            .then(res => {
                Swal.close();
                if(res.status === 'success') {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('rankCard').style.display = 'block';
                    document.getElementById('airRank').innerText = res.airRank;
                }
            })
            .catch(err => Swal.fire('Error!', 'Network issue!', 'error'));
    };
</script>
</body>
</html>
