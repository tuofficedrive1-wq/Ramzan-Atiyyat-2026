<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمضان عطیات مقابلہ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://cdn.jsdelivr.net/gh/m-a-k-cool/fonts/Jameel%20Noori%20Nastaleeq.ttf');
        }
        body {
            background-color: #f4f7f6;
            font-family: 'Jameel Noori Nastaleeq', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 550px; }
        .form-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid #198754;
        }
        .header-title { color: #198754; font-size: 30px; font-weight: bold; text-align: center; }
        .sub-title { color: #2c3e50; font-size: 24px; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .form-label { font-size: 20px; color: #444; margin-bottom: 5px; display: block; }
        .form-control, .form-select { font-family: 'Jameel Noori Nastaleeq', serif; font-size: 18px; border-radius: 10px; margin-bottom: 15px; }
        .btn-submit { background-color: #198754; color: white; width: 100%; padding: 12px; font-size: 24px; border-radius: 10px; border: none; }
        
        /* Rank Card */
        #rankCard { display: none; text-align: center; }
        .rank-box { background: #e8f5e9; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #c8e6c9; }
        .rank-number { font-size: 45px; color: #d32f2f; font-weight: bold; }
        .total-amount { font-size: 22px; color: #1b5e20; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <div id="formSection">
            <h1 class="header-title">رمضان عطیات مقابلہ</h1>
            <h2 class="sub-title">جامعۃ المدینہ انڈیا</h2>

            <form id="atiyyatForm">
                <label class="form-label">نام (Name)</label>
                <input type="text" name="name" class="form-control" placeholder="اپنا نام لکھیں" required>

                <label class="form-label">جامعہ (Jamia)</label>
                <input type="text" name="jamia" class="form-control" placeholder="جامعہ کا نام" required>

                <label class="form-label">درجہ (معلم الدرجہ)</label>
                <input type="text" name="darja" class="form-control" placeholder="درجہ لکھیں" required>

                <label class="form-label">ریجن (Region)</label>
                <select name="region" class="form-select" required>
                    <option value="" disabled selected>منتخب کریں</option>
                    <option value="اجمیر">اجمیر</option>
                    <option value="دہلی">دہلی</option>
                    <option value="ممبئی">ممبئی</option>
                    <option value="حیدرآباد">حیدرآباد</option>
                    <option value="بینگلور">بینگلور</option>
                    <option value="کلکتہ">کلکتہ</option>
                </select>

                <label class="form-label">آپ کے عطیات</label>
                <input type="number" name="personal_amount" class="form-control" placeholder="رقم درج کریں" required>

                <label class="form-label">آپ کے درجے کے عطیات</label>
                <input type="number" name="class_amount" class="form-control" placeholder="رقم درج کریں" required>

                <button type="submit" class="btn btn-submit" id="submitBtn">ڈیٹا جمع کریں</button>
            </form>
        </div>

        <div id="rankCard">
            <h2 style="color: #198754;">ماشاءاللہ! رینکنگ لسٹ</h2>
            <hr>
            <div class="rank-box" style="background: #fff3e0; border-color: #ffe0b2;">
                <div style="font-size: 18px;">آپ کی کل جمع کردہ رقم:</div>
                <div class="total-amount">₹ <span id="yourTotalDisplay">0</span></div>
            </div>
            <div class="rank-box">
                <div style="font-size: 20px;">آل انڈیا رینک:</div>
                <div class="rank-number" id="airRankDisplay">0</div>
            </div>
            <div class="rank-box" style="background: #e3f2fd; border-color: #bbdefb;">
                <div style="font-size: 20px;">ریجن (<span id="regionNameDisplay"></span>) میں رینک:</div>
                <div class="rank-number" style="color: #1976d2;" id="regRankDisplay">0</div>
            </div>
            <button onclick="window.location.reload()" class="btn btn-success mt-3 w-100">واپس جائیں</button>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwYSQ5SjOv1xflutDizh-sjhg8gtXE02CfJlwu9te6GeBhQsrQwpr7D4KFZ5T0Fr_ME/exec';
    const form = document.getElementById('atiyyatForm');
    const formSection = document.getElementById('formSection');
    const rankCard = document.getElementById('rankCard');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "انتظار کریں...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    formSection.style.display = 'none';
                    rankCard.style.display = 'block';
                    
                    document.getElementById('yourTotalDisplay').innerText = data.yourTotal;
                    document.getElementById('airRankDisplay').innerText = data.airRank;
                    document.getElementById('regRankDisplay').innerText = data.regRank;
                    document.getElementById('regionNameDisplay').innerText = data.regionName;
                }
            })
            .catch(error => alert("Net ka masla hai!"));
    });
</script>

</body>
</html>
